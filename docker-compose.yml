services:
  php:
    image: php:8.3-fpm
    volumes:
      - ./backend:/var/www
    working_dir: /var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5433:5432"
